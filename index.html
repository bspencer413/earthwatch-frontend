<script type="text/babel">
const { useState, useEffect } = React;

const API_BASE = 'https://earthwatch-backend.onrender.com';
const EW_BG = 'https://raw.githubusercontent.com/bspencer413/earthwatch-frontend/main/earthrise_bg.jpg';
const EW_LOGIN_BG = 'https://raw.githubusercontent.com/bspencer413/earthwatch-frontend/main/earthrise_bg.jpg';

const APP_VERSION = '0.1.2';

// === CW LEGACY (commented for EW) ============================================
// FLEET_DATA, RISK_INDICATORS, findCruiseLineKey, editDistance, findShipSuggestion,

// ── EW helpers ────────────────────────────────────────────────────────────────

const toTitleCase = (str) => {
  if (!str) return '';
  return str.toLowerCase().split(' ').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
};

const smartTitleCase = (str) => {
  if (!str) return '';
  return toTitleCase(str.trim());
};

// Hazard type → emoji icon. Kept compact for the drawer cards.
const hazardIcon = (type) => {
  if (type === 'earthquake') return '🌐';
  if (type === 'severe_weather' || type === 'storm') return '⛈️';
  if (type === 'tornado') return '🌪️';
  if (type === 'hurricane' || type === 'tropical_cyclone') return '🌀';
  if (type === 'wildfire' || type === 'fire') return '🔥';
  if (type === 'volcano') return '🌋';
  if (type === 'flood') return '💧';
  if (type === 'tsunami') return '🌊';
  if (type === 'winter_storm' || type === 'ice') return '❄️';
  return '⚠️';
};

// Severity → color + label. Maps the four-bucket severity from the backend
// (minor / moderate / severe / extreme) to amber-stack styling.
const severityStyle = (sev) => {
  if (sev === 'extreme') return { border: '#dc2626', headerBg: '#991b1b', cardBg: 'rgba(127,29,29,0.45)', label: 'Extreme' };
  if (sev === 'severe')  return { border: '#ea580c', headerBg: '#9a3412', cardBg: 'rgba(124,45,18,0.45)', label: 'Severe' };
  if (sev === 'moderate')return { border: '#d97706', headerBg: '#92400e', cardBg: 'rgba(120,53,15,0.45)', label: 'Moderate' };
  return { border: '#a16207', headerBg: '#713f12', cardBg: 'rgba(113,63,18,0.35)', label: 'Minor' };
};

const formatDistance = (mi) => {
  if (mi == null) return '';
  if (mi < 1) return '< 1 mi';
  if (mi < 10) return mi.toFixed(1) + ' mi';
  return Math.round(mi) + ' mi';
};

const formatRelativeTime = (iso) => {
  if (!iso) return '';
  try {
    const t = new Date(iso.replace(' ', 'T') + (iso.indexOf('Z') === -1 && iso.indexOf('+') === -1 ? 'Z' : ''));
    const diffMs = Date.now() - t.getTime();
    const min = Math.floor(diffMs / 60000);
    if (min < 1) return 'just now';
    if (min < 60) return min + ' min ago';
    const hrs = Math.floor(min / 60);
    if (hrs < 24) return hrs + ' hr ago';
    const days = Math.floor(hrs / 24);
    if (days < 30) return days + ' day' + (days === 1 ? '' : 's') + ' ago';
    return t.toLocaleDateString();
  } catch (e) { return ''; }
};

const RADIUS_PRESETS = [50, 100, 250, 500];

// ── Icon components (kept) ────────────────────────────────────────────────────

const SearchIcon = () => (

);

const HeartIcon = () => (

);

const InfoIcon = () => (
  <svg className="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>

const BellIcon = ({ red }) => (

);

const PlusIcon = () => (

);

const TrashIcon = () => (
  <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>

const EditIcon = () => (
  <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" /></svg>
);

const CheckIcon = () => (
  <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M5 13l4 4L19 7" /></svg>
);

const EyeIcon = () => (
  <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" /></svg>

const EyeOffIcon = () => (
  <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21" /></svg>
);

const ClearableInput = ({ value, onChange, onBlur, onKeyPress, placeholder, type='text', maxLength, inputClass, numeric }) => (
  <div className="relative">
    <input type={type} value={value} onChange={onChange} onBlur={onBlur} onKeyPress={onKeyPress} placeholder={placeholder} maxLength={maxLength} inputMode={numeric ? 'decimal' : undefined} className={inputClass + ' pr-10'} autoCorrect="off" autoCapitalize={numeric ? 'off' : undefined} spellCheck="false" />
    {value && (
      <button onClick={() => onChange({ target: { value: '' } })} className="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-white text-xl font-bold leading-none" type="button">X</button>
    )}
  </div>
);

const CardPageHeader = ({ title, subtitle }) => (
  <div className="mb-3 pb-2 border-b border-slate-700/30 text-center">
    <h2 className="text-4xl font-black text-white tracking-wide">{title}</h2>
    {subtitle && <p className="text-teal-300 italic text-xl mt-1">{subtitle}</p>}
  </div>
);

const POSTER_STYLE = {
  backgroundColor: '#0a0a0a',
  backgroundImage: 'url(' + EW_BG + ')',
  backgroundSize: 'cover',
  backgroundPosition: 'center top',
  backgroundRepeat: 'no-repeat',
  backgroundAttachment: 'scroll',
};

const WOOD_STYLE = {
  backgroundColor: '#0a0a0a',
  backgroundImage: 'url(' + EW_BG + ')',
  backgroundSize: 'cover',
  backgroundPosition: 'center top',
  backgroundRepeat: 'no-repeat',
  backgroundAttachment: 'scroll',
  filter: 'none',
};

const PageWrapper = ({ children, bgStyle }) => {
  var bg = bgStyle || POSTER_STYLE;
  var isListPage = bg === WOOD_STYLE;
  return (
    <div style={{ minHeight: '100dvh', width: '100%', position: 'relative', paddingTop: 'env(safe-area-inset-top)', paddingBottom: '5rem', backgroundColor: bg.backgroundColor, backgroundImage: bg.backgroundImage || 'none', backgroundSize: bg.backgroundSize || 'auto', backgroundPosition: bg.backgroundPosition || 'top', backgroundRepeat: bg.backgroundRepeat || 'no-repeat', backgroundAttachment: bg.backgroundAttachment || 'scroll' }}>
      {isListPage && <div style={{ position: 'fixed', inset: 0, backdropFilter: 'blur(8px)', WebkitBackdropFilter: 'blur(8px)', backgroundColor: 'rgba(10,10,10,0.55)', zIndex: 0 }} />}
      <div style={{ position: 'absolute', top: 0, left: 0, right: 0, bottom: 0, backgroundColor: isListPage ? 'transparent' : 'rgba(10,10,10,0.30)' }} />
      <div style={{ position: 'relative', zIndex: 10 }}>{children}</div>
    </div>
  );
};
function App() {
  const [page, setPage] = useState('login');
  const [auth, setAuth] = useState(false);
  const [user, setUser] = useState(null);
  const [places, setPlaces] = useState([]);
  const [notifications, setNotifications] = useState([]);
  const [expandedAlertGroups, setExpandedAlertGroups] = useState({});
  const [loading, setLoading] = useState(false);
  const [backendWaking, setBackendWaking] = useState(false);
  const [email, setEmail] = useState('');
  const [password, setPassword] = useState('');
  const [showPassword, setShowPassword] = useState(false);
  const [newPlace, setNewPlace] = useState({ name: '', lat: '', lng: '', radius: 100 });
  const [geoQuery, setGeoQuery] = useState('');
  const [geoCandidates, setGeoCandidates] = useState([]);
  const [geoPicked, setGeoPicked] = useState(null);
  const [geoSearching, setGeoSearching] = useState(false);
  const [geoMsg, setGeoMsg] = useState('');
  const [editingId, setEditingId] = useState(null);
  const [editingName, setEditingName] = useState('');
  const [showDangerZone, setShowDangerZone] = useState(false);
  const [showDeleteConfirm, setShowDeleteConfirm] = useState(false);
  const [drawerData, setDrawerData] = useState(null);
  const [drawerLoading, setDrawerLoading] = useState(false);
  const [apiVersion, setApiVersion] = useState('...');
  const [addPlaceMsg, setAddPlaceMsg] = useState('');

  // Viewport sizing
  const [viewportW, setViewportW] = useState(typeof window !== 'undefined' ? window.innerWidth : 400);
  useEffect(() => {
    const onResize = () => setViewportW(window.innerWidth);
    window.addEventListener('resize', onResize);
    return () => window.removeEventListener('resize', onResize);
  }, []);
  const isPhone = viewportW < 640;
  const isTablet = viewportW >= 640 && viewportW < 1024;

  useEffect(() => {
    fetch(API_BASE + '/health').then(r => r.json()).then(d => setApiVersion(d.version || '?')).catch(() => setApiVersion('?'));
    const t = localStorage.getItem('ew_token');
    const u = localStorage.getItem('ew_user');
    if (t && u) {
      try { setUser(JSON.parse(u)); setAuth(true); setPage('search'); loadPlaces(); loadNotifications(); }
      catch(e) { localStorage.removeItem('ew_token'); localStorage.removeItem('ew_user'); }
    }
    const handleVisibilityChange = () => {
      if (document.visibilityState === 'visible') {
        setTimeout(() => { document.querySelectorAll('input').forEach(i => i.blur()); }, 100);
      }
    };
    document.addEventListener('visibilitychange', handleVisibilityChange);
    return () => document.removeEventListener('visibilitychange', handleVisibilityChange);
  }, []);

  const loadPlaces = async () => {
    try {
      const token = localStorage.getItem('ew_token');
      const r = await fetch(API_BASE + '/ew/places', { headers: { 'Authorization': 'Bearer ' + token } });
      if (!r.ok) throw new Error('Failed');
      setPlaces(await r.json());
    } catch (e) { console.error(e); }
  };

  const loadNotifications = async () => {
    try {
      const token = localStorage.getItem('ew_token');
      const r = await fetch(API_BASE + '/notifications', { headers: { 'Authorization': 'Bearer ' + token } });
      if (!r.ok) throw new Error('Failed');
      setNotifications(await r.json());
    } catch (e) { console.error(e); }
  };

  const dismissAlert = async (notifId) => {
    const token = localStorage.getItem('ew_token');
    setNotifications(prev => prev.filter(n => n.id !== notifId));
    try { await fetch(API_BASE + '/notifications/' + notifId, { method: 'DELETE', headers: { 'Authorization': 'Bearer ' + token } }); } catch(e) {}
  };

  const doAuth = async (mode) => {
    if (!email || !password) return;
    setLoading(true);
    setBackendWaking(false);
    const wakingTimer = setTimeout(() => setBackendWaking(true), 3500);
    try {
      const r = await fetch(API_BASE + '/auth/' + mode, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email: email, password: password })
      });
      clearTimeout(wakingTimer);
      setBackendWaking(false);
      if (!r.ok) {
        const err = await r.json().catch(() => ({}));
        alert(err.detail || 'Authentication failed');
        setLoading(false);
        return;
      }
      const data = await r.json();
      localStorage.setItem('ew_token', data.access_token);
      const u = { email: email };
      localStorage.setItem('ew_user', JSON.stringify(u));
      setUser(u); setAuth(true); setPage('search');
      await loadPlaces();
      await loadNotifications();
    } catch (e) {
      clearTimeout(wakingTimer);
      setBackendWaking(false);
      alert('Network error: ' + e.message);
    }
    setLoading(false);
  };

  const doLogout = () => {
    localStorage.removeItem('ew_token');
    localStorage.removeItem('ew_user');
    setUser(null); setAuth(false); setPlaces([]); setNotifications([]);
    setPage('login');
  };

  const doDeleteAccount = async () => {
    const token = localStorage.getItem('ew_token');
    try {
      await fetch(API_BASE + '/account', { method: 'DELETE', headers: { 'Authorization': 'Bearer ' + token } });
    } catch(e) {}
    doLogout();
  };

  const doGeocode = async () => {
    setGeoMsg('');
    setGeoCandidates([]);
    setGeoPicked(null);
    var q = (geoQuery || '').trim();
    if (q.length < 2) { setGeoMsg('Type a city, address, or landmark.'); return; }
    setGeoSearching(true);
    try {
      var token = localStorage.getItem('ew_token');
      var r = await fetch(API_BASE + '/ew/geocode', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
        body: JSON.stringify({ query: q })
      });
      if (!r.ok) {
        var err = await r.json().catch(function(){ return {}; });
        setGeoMsg(err.detail || 'Search failed. Try a different query.');
        setGeoSearching(false);
        return;
      }
      var data = await r.json();
      var cands = data.candidates || [];
      setGeoCandidates(cands);
      if (cands.length === 0) setGeoMsg('No matches. Try a more specific query.');
    } catch (e) {
      setGeoMsg('Network error: ' + e.message);
    }
    setGeoSearching(false);
  };

  const addPlace = async () => {
    setAddPlaceMsg('');
    var name = (newPlace.name || '').trim();
    var radius = parseFloat(newPlace.radius) || 100;
    var lat, lng;
    if (geoPicked) {
      lat = geoPicked.lat;
      lng = geoPicked.lng;
      if (!name) name = geoPicked.formatted_address.split(',')[0].trim();
    } else {
      lat = parseFloat(newPlace.lat);
      lng = parseFloat(newPlace.lng);
    }
    if (!name) { setAddPlaceMsg('Please enter a name for this place.'); return; }
    if (isNaN(lat) || lat < -90 || lat > 90) { setAddPlaceMsg('Search for a place first, or enter coordinates.'); return; }
    if (isNaN(lng) || lng < -180 || lng > 180) { setAddPlaceMsg('Search for a place first, or enter coordinates.'); return; }
    var token = localStorage.getItem('ew_token');
    try {
      var r = await fetch(API_BASE + '/ew/places', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
        body: JSON.stringify({ name: name, lat: lat, lng: lng, radius_mi: radius, alert_level: 'realtime' })
      });
      if (!r.ok) {
        var err = await r.json().catch(function(){ return {}; });
        setAddPlaceMsg(err.detail || 'Failed to add place.');
        return;
      }
      setNewPlace({ name: '', lat: '', lng: '', radius: 100 });
      setGeoQuery('');
      setGeoCandidates([]);
      setGeoPicked(null);
      setAddPlaceMsg('Added "' + name + '" to your watchlist.');
      await loadPlaces();
      setTimeout(function(){ setAddPlaceMsg(''); setPage('watchlist'); }, 900);
    } catch (e) {
      setAddPlaceMsg('Network error: ' + e.message);
    }
  };

  const removePlace = async (id) => {
    const token = localStorage.getItem('ew_token');
    try {
      await fetch(API_BASE + '/ew/places/' + id, { method: 'DELETE', headers: { 'Authorization': 'Bearer ' + token } });
      await loadPlaces();
    } catch(e) {}
  };

  const setPlaceArchived = async (id, archived) => {
    const token = localStorage.getItem('ew_token');
    try {
      await fetch(API_BASE + '/ew/places/' + id, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
        body: JSON.stringify({ is_archived: archived })
      });
      await loadPlaces();
    } catch(e) {}
  };

  const renamePlace = async (id, name) => {
    const token = localStorage.getItem('ew_token');
    try {
      await fetch(API_BASE + '/ew/places/' + id, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
        body: JSON.stringify({ name: name })
      });
      await loadPlaces();
    } catch(e) {}
  };

  const openPlaceDrawer = async (place) => {
    setDrawerData({ place: place, events: [], count: 0 });
    setDrawerLoading(true);
    const token = localStorage.getItem('ew_token');
    try {
      const r = await fetch(API_BASE + '/ew/places/' + place.id + '/events', { headers: { 'Authorization': 'Bearer ' + token } });
      if (r.ok) {
        const data = await r.json();
        setDrawerData(data);
      }
    } catch(e) { console.error(e); }
    setDrawerLoading(false);
  };

  const HazardDrawer = () => {
    if (!drawerData) return null;
    const place = drawerData.place || {};
    const events = drawerData.events || [];
    return (
      <div>
        <div className="modal-overlay" onClick={() => setDrawerData(null)} />
        <div className="modal-drawer">
          <div className="px-4 pt-4 pb-2 border-b border-slate-700/40 flex items-start justify-between">
            <div className="flex-1 min-w-0 pr-2">
              <h2 className="text-2xl font-bold text-white truncate">{place.name}</h2>
              <p className="text-teal-300 text-base">

                    for (var ni = 0; ni < notifications.length; ni++) {

                      if (!groups[key]) { groups[key] = { name: n.name, watchlist_id: n.watchlist_id, items: [], latest: n.created_at }; order.push(key); }
                      groups[key].items.push(n);
                      if (n.created_at > groups[key].latest) groups[key].latest = n.created_at;
                    }
                    return order.map(function(k) {
                      var g = groups[k];
                      var firstId = g.items[0].id;
                      var isExpanded = !!expandedAlertGroups[k];
                      var visibleItems = isExpanded ? g.items : g.items.slice(0, 1);
                      var moreCount = g.items.length - 1;

                        <div key={k} className="p-3 bg-slate-900/50 border border-slate-800 rounded-xl">

              <h3 className="font-bold text-white mb-1 text-2xl">Privacy Policy</h3>
              <p className="text-gray-400 text-xl mb-3">Last updated: April 2026</p>
              <div className="space-y-3 text-gray-200 text-xl leading-relaxed">
                <p><strong className="text-white">We collect:</strong> your email address, your watched places, and anonymous usage data.</p>
                <p><strong className="text-white">Addresses are safe:</strong> When you search for a place, we send the address you typed to Google's geocoding service to convert it to coordinates. We don't store your address — only the resulting latitude/longitude and the name you give the place.</p>
                <p><strong className="text-white">How we use it:</strong> We do not sell your personal information. Ever.</p>
                <p><strong className="text-white">Data sources:</strong> Hazard information is based on publicly available sources from USGS, NWS, NASA, and GDACS.</p>
                <p><strong className="text-white">Your rights:</strong> You may delete your account and all associated data at any time.</p>
                <p><strong className="text-white">Disclaimer:</strong> Hazard information is provided for informational purposes only. Always follow guidance from local authorities. EarthWatch is not a substitute for official emergency notifications.</p>
                <a href="mailto:hello@earthwatch.app" className="text-teal-400 text-xl">hello@earthwatch.app</a>
              </div>
            </div>
            <div className="px-1 space-y-3 pb-2">
              <div className="p-3 bg-black/30 rounded-xl"><p className="font-medium text-gray-200 text-xl text-center">{user && user.email}</p></div>
              <button onClick={doLogout} className="w-full py-4 bg-teal-700 hover:bg-slate-800 text-white rounded-xl text-2xl font-bold">Sign Out</button>
              <button onClick={() => setShowDangerZone(!showDangerZone)} className="w-full py-3 text-gray-500 text-xl text-center">{showDangerZone ? 'Hide' : 'Account Removal'}</button>
              {showDangerZone && (
                <div className="space-y-3">
                  {!showDeleteConfirm
                    ? <button onClick={() => setShowDeleteConfirm(true)} className="w-full py-4 bg-gray-900/70 border border-slate-800 text-teal-400 rounded-xl text-xl">Delete Account</button>
                    : <div className="bg-slate-900/90 border border-slate-800 rounded-2xl p-5 space-y-3">
                        <h3 className="font-bold text-teal-400 text-xl">Are you sure?</h3>
                        <p className="text-teal-300 text-xl">This will permanently delete your account and all data.</p>
                        <button onClick={doDeleteAccount} className="w-full py-4 bg-teal-700 text-white rounded-xl font-bold text-xl">Yes, Permanently Delete My Account</button>
                        <button onClick={() => { setShowDeleteConfirm(false); setShowDangerZone(false); }} className="w-full py-4 bg-gray-800 border border-gray-600 text-gray-300 rounded-xl font-medium text-xl">Cancel</button>
                      </div>
                  }
                </div>
              )}
            </div>
            <p className="text-white/30 text-center text-sm pb-4">v{APP_VERSION}</p>
          </div>
        )}

      </div>

      {/* ── Bottom nav ───────────────────────────────────────────────────── */}
      <div style={{ position: 'fixed', bottom: 0, left: 0, right: 0, backgroundColor: 'rgba(10,10,10,0.95)', backdropFilter: 'blur(8px)', borderTop: '1px solid #1e3a4a', padding: '0.5rem 1rem', paddingBottom: 'max(0.5rem, env(safe-area-inset-bottom))' }}>
        <div className="flex justify-around max-w-sm mx-auto">
          <button onClick={() => setPage('search')} className={'flex flex-col items-center gap-0.5 px-1 py-1 ' + (page === 'search' ? 'text-teal-400' : 'text-gray-400')}>
            <SearchIcon /><span className="text-xl font-medium">Search</span>
          </button>
          <button onClick={() => setPage('watchlist')} className={'flex flex-col items-center gap-0.5 px-1 py-1 ' + (page === 'watchlist' ? 'text-teal-400' : 'text-gray-400')}>
            <HeartIcon /><span className="text-xl font-medium">Watchlist</span>
          </button>
          <button onClick={() => setPage('places')} className={'flex flex-col items-center gap-0.5 px-1 py-1 ' + (page === 'places' ? 'text-teal-400' : 'text-gray-400')}>
            <svg className="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" /><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" /></svg>
            <span className="text-xl font-medium">My Places</span>
          </button>
          <button onClick={() => setPage('alerts')} className={'flex flex-col items-center gap-0.5 px-1 py-1 relative ' + (page === 'alerts' ? 'text-teal-400' : 'text-gray-400')}>
            <BellIcon red={unreadCount > 0} />
            {unreadCount > 0 && <span className="absolute top-0 right-1 bg-teal-600 text-white text-xl font-bold rounded-full w-4 h-4 flex items-center justify-center">{unreadCount > 9 ? '9+' : unreadCount}</span>}
            <span className="text-xl font-medium" style={unreadCount > 0 ? {color:'#0d9488'} : {}}>Alerts</span>
          </button>
          <button onClick={() => setPage('info')} className={'flex flex-col items-center gap-0.5 px-1 py-1 ' + (page === 'info' ? 'text-teal-400' : 'text-gray-400')}>
            <InfoIcon /><span className="text-xl font-medium">Info</span>
          </button>
        </div>
        <p className="text-center text-gray-600 text-xs mt-1" style={{display: page === 'search' ? 'none' : 'block'}}>app v{APP_VERSION} | api v{apiVersion}</p>
      </div>
    </PageWrapper>
  );
}

ReactDOM.render(React.createElement(App), document.getElementById('root'));
</script>
</body>
</html>
